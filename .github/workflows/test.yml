name: Tests

on:
  push:
  pull_request:

jobs:
  parser-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run regression tests
        run: npm test
